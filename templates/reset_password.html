<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — StudyTrack</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="icon">🔐</div>
        <div class="word">STUDYTRACK</div>
      </div>
      <p class="auth-tagline">{{ email }}</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-list">
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('reset_password') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="panel panel-purple" style="margin: 0 0 16px; padding: 14px 16px;">
          <div class="panel-label">❓ {{ security_question }}</div>
          <input type="text" name="security_answer" placeholder="Your answer" required style="margin-top:4px;">
        </div>

        <div class="auth-field field">
          <label>New Password</label>
          <input type="password" name="new_password" placeholder="••••••••" required minlength="6">
        </div>
        <div class="auth-field field">
          <label>Confirm New Password</label>
          <input type="password" name="confirm_password" placeholder="••••••••" required minlength="6">
        </div>

        <button type="submit" class="btn btn-green btn-block">🔓 Reset Password</button>
      </form>

      <div class="auth-switch">
        <a href="{{ url_for('forgot_password') }}">← Use a different Gmail address</a>
      </div>
    </div>
  </div>
</body>
</html>
