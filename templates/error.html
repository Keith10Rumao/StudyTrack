<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ code }} — StudyTrack</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card" style="text-align:center;">
      <div class="auth-logo" style="justify-content:center;">
        <div class="icon">⚠️</div>
        <div class="word">{{ code }}</div>
      </div>
      <p class="auth-tagline">{{ title }}</p>
      <p style="font-size:0.88rem; font-weight:600; color:var(--text-dim); margin:14px 0 22px;">
        {{ message }}
      </p>
      <a href="{{ url_for('dashboard') }}" class="btn btn-yellow btn-block">🏠 Back to Dashboard</a>
    </div>
  </div>
</body>
</html>
