<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — StudyTrack</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <a href="{{ url_for('landing') }}" class="auth-logo" style="text-decoration:none;">
        <div class="icon">📚</div>
        <div class="word">STUDYTRACK</div>
      </a>
      <p class="auth-tagline">Single source of truth</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-list">
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="auth-field field">
          <label>Gmail Address</label>
          <input type="email" name="email" placeholder="you@gmail.com" required>
          <div class="gmail-hint">Sign in with your Gmail address.</div>
        </div>
        <div class="auth-field field">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required>
          <div style="text-align:right; margin-top:6px;">
            <a href="{{ url_for('forgot_password') }}" style="font-size:0.72rem; font-weight:700; text-decoration:underline; color:var(--text-dim);">Forgot your password?</a>
          </div>
        </div>
        <button type="submit" class="btn btn-yellow btn-block">🔓 Sign In</button>
      </form>

      <div class="auth-switch">
        Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a>
      </div>
    </div>
  </div>
</body>
</html>
